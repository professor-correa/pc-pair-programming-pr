<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botão Fujão</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Inconsolata:wght@200..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <p>&COPY; Thamiris e Ryan</p>
    <button id="fugir">Try to catch me if you can!!!</button>

    <script>
        const botao = document.getElementById('fugir');

        botao.addEventListener('mouseenter', () => {
            const larguraMax = window.innerWidth - botao.offsetWidth;
            const alturaMax = window.innerHeight - botao.offsetHeight;
            const novoX = Math.random() * larguraMax;
            const novoY = Math.random() * alturaMax;
            botao.style.left = `${novoX}px`;
            botao.style.top = `${novoY}px`;
        });
    </script>
</body>

</html>
